apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent-monitor.fullname" . }}-config
  labels:
    {{- include "agent-monitor.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- range $key, $value := .Values.extraEnv }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
