# =============================================================================
# Staging Environment Overrides
# =============================================================================
# Usage: helm install agent-monitor ./agent-monitor -f values-staging.yaml

replicaCount: 2

env:
  NODE_ENV: production
  DASHBOARD_PORT: "4820"
  LOG_LEVEL: info

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 80
  scaleDownStabilizationWindowSeconds: 180

persistence:
  enabled: true
  size: 5Gi

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
  hosts:
    - host: agent-monitor.staging.internal
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: agent-monitor-staging-tls
      hosts:
        - agent-monitor.staging.internal

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
