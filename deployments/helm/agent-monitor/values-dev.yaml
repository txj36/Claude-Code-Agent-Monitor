# =============================================================================
# Development Environment Overrides
# =============================================================================
# Usage: helm install agent-monitor ./agent-monitor -f values-dev.yaml

replicaCount: 1

image:
  pullPolicy: Always

env:
  NODE_ENV: development
  DASHBOARD_PORT: "4820"
  LOG_LEVEL: debug

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false

persistence:
  enabled: true
  size: 1Gi

podDisruptionBudget:
  enabled: false

networkPolicy:
  enabled: false

monitoring:
  enabled: false

ingress:
  enabled: false

# Relax security for dev debugging
securityContext:
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
