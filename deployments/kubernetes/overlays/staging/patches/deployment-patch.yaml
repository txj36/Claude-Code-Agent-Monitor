apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-monitor
  namespace: agent-monitor
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: agent-monitor
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
